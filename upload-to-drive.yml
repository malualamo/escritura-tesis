name: Compilar tesis y subir a Drive

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compilar LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: tesis/tesis.tex   # <-- cambiá por tu archivo principal
          latexmk_use_xelatex: false  # ponelo en true si usás xelatex

      - name: Autenticar con Google
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GDRIVE_CREDENTIALS }}

      - name: Subir PDF a Google Drive
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: tesis.pdf             # <-- nombre del PDF generado
          destination: drive:///${{ secrets.GDRIVE_FOLDER_ID }}/tesis.pdf
          parent: true

